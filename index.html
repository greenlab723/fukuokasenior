<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0">
  <title>スマホ対応スプレッドシート</title>
  
  <style>
    /* 余白をなくし、画面いっぱいに広げる設定 */
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      overflow: hidden; /* 外側のスクロールを消す */
    }
    
    /* 埋め込み枠の設定 */
    .iframe-wrapper {
      width: 100%;
      height: 100%;
      -webkit-overflow-scrolling: touch; /* スマホでのスクロールを滑らかにする */
    }
    
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <div class="iframe-wrapper">
    <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTapJUbg7IaZ4N3rTSSphU4ifws3sjHUJnEVRruqs3-iP5Bse6aJe3ZGeQw8QlkgDTncxuAn80PU2XX/pubhtml?gid=703030742&single=true&chrome=false&widget=false"></iframe>
  </div>

</body>
</html>
