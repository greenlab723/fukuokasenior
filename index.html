<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0">
  <title>第10回福岡シニアOGT2026</title>
  
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      /* 以前あった overflow: hidden; を削除し、画面全体のスクロールを邪魔しないようにしました */
    }
    
    .iframe-wrapper {
      width: 100%;
      height: 100vh; /* 縦幅をスマホの画面ピッタリに合わせる */
      overflow: auto; /* ここが超重要！はみ出た分をスクロールできるようにする */
      -webkit-overflow-scrolling: touch; /* 指でのスクロールを滑らかにする */
    }
    
    iframe {
      /* ↓右側が切れるバグを防ぐための魔法の2行（スマホに幅を誤認させない） */
      min-width: 100%;
      width: 1px; 
      
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <div class="iframe-wrapper">
    <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTapJUbg7IaZ4N3rTSSphU4ifws3sjHUJnEVRruqs3-iP5Bse6aJe3ZGeQw8QlkgDTncxuAn80PU2XX/pubhtml?gid=703030742&single=true&chrome=false&widget=false" scrolling="yes"></iframe>
  </div>

</body>
</html>
